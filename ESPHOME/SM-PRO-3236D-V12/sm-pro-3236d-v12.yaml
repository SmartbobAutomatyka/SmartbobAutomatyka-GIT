
# HA
api:
  encryption:
    key: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  reboot_timeout: 0s

# OTA
ota:
  - platform: esphome
  #password: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# NAME / NAZWA
substitutions:
  name: sm-pro-3236d-v12
  friendly_name: sm-pro-3236d-v12

# DATA
esphome:
  name: ${name}
  comment: ${friendly_name}
  project:
    name: "smartbob.sm-pro-3236d"
    version: "1.0.0"
  on_boot:
    then:
      - display.page.show: page1
      - delay: 7s
      - display.page.show: page2
  # ADD MAC NUMBER TO NAME / DODAWANIE ADRESU MAC DO NAZWY
  name_add_mac_suffix: false

# PROCESOR
esp32:
  board: esp32dev
  framework:
    type: arduino

# LOGING LEVEL / LOGOWANIE
logger:
  level: DEBUG

# 1WIRE
one_wire:
  - platform: gpio
    id: com_one_wire
    pin: GPIO32

# UART-RS485
uart:
  - id: com_uart
    rx_pin: 39
    tx_pin: 14
    baud_rate: 9600
    stop_bits: 1
    data_bits: 8
    parity: NONE
    debug:
      direction: BOTH

# LAN OR WIFI
##### WIFI SECTION / KONFIGURACJA WIFI

# Improv via Serial / Automatyczna konfiguracja za pomoca kabla USB przez https://www.improv-wifi.com/
# improv_serial:

## SETUP WIFI AS CLIENT MODE / USTAW WIFI JAKO KLIENTA
#wifi:
  #id: eth
  #ssid: "MY_WIFI_SSID"
  #password: "MY_WIFI_PASS"

## SETUP WIFI AS ACCESS POINT / USTAW WIFI W TRYB PRACY ACCESS POINT
  #ap:
  #  password: "MY_WIFI_PASS"

#### WIFI END
##### LAN SECTION/ KONFIGURACJA LAN
ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk_mode: GPIO17_OUT
  phy_addr: 1
  id: eth

  #manual_ip:
  #  static_ip: 192.168.0.50
  #  gateway: 192.168.0.1
  #  subnet: 255.255.255.0
  #  dns1 : 8.8.8.8
  #  dns2 : 8.8.4.4

#### LAN END

##########################################################
##### SEKCJA USTAWIEŃ ELEMENTÓW MAGISTRAILI
##########################################################

# KOMUNIKACJA UART-RS485
#uart:
#  rx_pin: 14
#  tx_pin: 39
#  baud_rate: 2400
#  stop_bits: 1

# KONFIGURACJA I2C
i2c:
  -  id: com_i2c_bus_a
     sda: 15
     scl: 33
     scan: true
     frequency: 400kHz
  -  id: com_i2c_bus_b
     sda: 5
     scl: 0
     scan: true
     frequency: 400kHz

# KONFIGURACJA MCP23017
mcp23017:
  - id: 'mcp23017_hub_2_in'
    address: 0x21
    i2c_id: com_i2c_bus_a
  - id: 'mcp23017_hub_1_in'
    address: 0x20
    i2c_id: com_i2c_bus_a

# KONFIGURACJA PCA9685
pca9685:
  - id: 'pca9685_hub_1_out'
    frequency: 1000
    address: 0x40
    i2c_id: com_i2c_bus_a
  - id: 'pca9685_hub_2_out'
    frequency: 1000
    address: 0x41
    i2c_id: com_i2c_bus_a

#KONFIGRUACJA ZEGARA CZASU RZECZYWISTEGO
time:
  - platform: ds1307
    id: ds1307_time
    i2c_id: com_i2c_bus_a
  - platform: homeassistant
    id: homeassistant_time
  - platform: sntp
    id: sntp_time
    timezone: Europe/Sofia
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org
    on_time_sync:
      then:
        # ... and update the RTC when the synchronization was successful
        ds1307.write_time:

